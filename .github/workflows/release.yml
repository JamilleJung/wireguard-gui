name: Release

# Tag a version to cut a release:
#   git tag vX.Y.Z && git push origin vX.Y.Z
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least privilege: the token is read-only everywhere except the publish job.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  arm64-tarball:
    name: Build aarch64 tarball
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate tag format
        run: |
          echo "$GITHUB_REF_NAME" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "::error::tag '$GITHUB_REF_NAME' is not vMAJOR.MINOR.PATCH"; exit 1; }

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libfontconfig-dev libxkbcommon-dev \
            libgl1-mesa-dev libegl1-mesa-dev libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-auditable
        run: cargo install cargo-auditable --version =0.7.4 --locked

      - name: Build release binary (with embedded SBOM)
        run: cargo auditable build --release --locked

      - name: cargo test
        run: cargo test --locked

      - name: Smoke helper and CLI
        run: |
          ./target/release/wireguard-gui --version | grep -q '^wireguard-gui '
          ./target/release/wireguard-gui --help >/dev/null
          bash tests/helper-validation.sh target/release/wg-helper

      # Shrink the shipped binaries (~60-70% smaller on disk). Done AFTER the
      # smoke checks above (which validate the real build), then re-smoked below
      # so a broken pack fails the release instead of shipping.
      - name: Compress binaries with UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends upx-ucl
          upx --best --lzma target/release/wireguard-gui target/release/wg-helper
          ./target/release/wireguard-gui --version | grep -q '^wireguard-gui '
          ./target/release/wireguard-gui --help >/dev/null

      - name: Build aarch64 tarball
        env:
          REF: ${{ github.ref_name }}
        run: |
          V="${REF#v}"
          D="wireguard-gui-${V}-aarch64-linux"
          mkdir -p "$D"
          cp target/release/wireguard-gui "$D/"
          cp target/release/wg-helper "$D/"
          cp packaging/wireguard-gui.desktop "$D/"
          cp packaging/wireguard-gui.svg "$D/"
          cp packaging/49-wireguard-gui.rules "$D/"
          cp install.sh README.md LICENSE "$D/"
          tar -czf "${D}.tar.gz" "$D"

      - name: Upload aarch64 tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wireguard-gui-aarch64-tarball
          path: wireguard-gui-*-aarch64-linux.tar.gz
          if-no-files-found: error

  release:
    name: Build artifacts & publish release
    needs: arm64-tarball
    runs-on: ubuntu-latest
    permissions:
      contents: write # elevated ONLY for the publishing job
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate tag format
        run: |
          echo "$GITHUB_REF_NAME" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "::error::tag '$GITHUB_REF_NAME' is not vMAJOR.MINOR.PATCH"; exit 1; }

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libfontconfig-dev libxkbcommon-dev \
            libgl1-mesa-dev libegl1-mesa-dev libdbus-1-dev \
            file desktop-file-utils shellcheck

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-auditable
        run: cargo install cargo-auditable --version =0.7.4 --locked

      - name: Build release binary (with embedded SBOM)
        run: cargo auditable build --release --locked

      - name: cargo test
        run: cargo test --locked

      - name: Smoke and shell validation
        run: |
          ./target/release/wireguard-gui --version | grep -q '^wireguard-gui '
          ./target/release/wireguard-gui --help >/dev/null
          bash -n install.sh
          bash -n tests/helper-validation.sh
          bash -n tests/installer-sanity.sh
          shellcheck -S warning install.sh tests/helper-validation.sh tests/installer-sanity.sh
          bash tests/helper-validation.sh target/release/wg-helper
          bash tests/installer-sanity.sh

      # Shrink the shipped binaries (~60-70% smaller on disk). Keep pristine
      # `.full` copies for the AppImage step (linuxdeploy patchelfs the ELF and
      # cannot process a UPX-packed binary; the AppImage is squashfs-compressed
      # anyway). The tarball and .deb use the compressed binaries.
      - name: Compress binaries with UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends upx-ucl
          cp target/release/wireguard-gui target/release/wireguard-gui.full
          cp target/release/wg-helper target/release/wg-helper.full
          upx --best --lzma target/release/wireguard-gui target/release/wg-helper
          ./target/release/wireguard-gui --version | grep -q '^wireguard-gui '
          ./target/release/wireguard-gui --help >/dev/null

      # ---------------- binary tarball ----------------
      - name: Build binary tarball
        env:
          REF: ${{ github.ref_name }}
        run: |
          V="${REF#v}"
          D="wireguard-gui-${V}-x86_64-linux"
          mkdir -p "$D"
          cp target/release/wireguard-gui "$D/"
          cp target/release/wg-helper "$D/"
          cp packaging/wireguard-gui.desktop "$D/"
          cp packaging/wireguard-gui.svg "$D/"
          cp packaging/49-wireguard-gui.rules "$D/"
          cp install.sh README.md LICENSE "$D/"
          tar -czf "${D}.tar.gz" "$D"

      - name: Download aarch64 tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wireguard-gui-aarch64-tarball
          path: .

      # ---------------- .deb ----------------
      - name: Build .deb
        run: |
          cargo install cargo-deb --version =2.12.1 --locked
          cargo deb --no-build --no-strip || cargo deb
          cp target/debian/*.deb .   # mandatory: fail the release if none exists

      # ---------------- AppImage (optional: never blocks the release) ----------------
      - name: Build AppImage
        continue-on-error: true
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          REF: ${{ github.ref_name }}
        run: |
          V="${REF#v}"
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/lib/wireguard-gui" \
                   "$APPDIR/usr/share/applications" \
                   "$APPDIR/usr/share/icons/hicolor/scalable/apps"
          # Use the uncompressed binaries: linuxdeploy patchelfs the ELF and
          # cannot process a UPX-packed executable.
          cp target/release/wireguard-gui.full "$APPDIR/usr/bin/wireguard-gui"
          cp target/release/wg-helper.full "$APPDIR/usr/lib/wireguard-gui/wg-helper"
          cp packaging/wireguard-gui.desktop "$APPDIR/usr/share/applications/"
          cp packaging/wireguard-gui.svg "$APPDIR/usr/share/icons/hicolor/scalable/apps/"
          # Pinned linuxdeploy release + verified checksum (supply-chain hardening)
          curl -fsSL -o linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-x86_64.AppImage
          echo "c20cd71e3a4e3b80c3483cef793cda3f4e990aca14014d23c544ca3ce1270b4d  linuxdeploy" | sha256sum -c -
          chmod +x linuxdeploy
          ./linuxdeploy --appdir "$APPDIR" \
            -e "$APPDIR/usr/bin/wireguard-gui" \
            -d packaging/wireguard-gui.desktop \
            -i packaging/wireguard-gui.svg \
            --output appimage
          # Gate inclusion: a missing or empty AppImage must not be silently
          # carried into the checksum/sign/publish steps. No `|| true` (so a
          # failed rename surfaces) and require a non-empty result.
          mv ./*.AppImage "wireguard-gui-${V}-x86_64.AppImage"
          test -s "wireguard-gui-${V}-x86_64.AppImage"

      # ---------------- checksums ----------------
      - name: Generate checksums
        run: |
          shopt -s nullglob
          artifacts=( *.tar.gz *.deb *.AppImage )
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "::error::no artifacts to checksum"; exit 1
          fi
          sha256sum "${artifacts[@]}" | tee SHA256SUMS
          test -s SHA256SUMS

      # ---------------- sign the checksums (minisign) — fail-closed ----------------
      - name: Sign SHA256SUMS with minisign
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
          REF: ${{ github.ref_name }}
        run: |
          if [ -z "$MINISIGN_KEY" ]; then
            echo "::error::MINISIGN_KEY secret not set — refusing to publish an unsigned release"
            exit 1
          fi
          sudo apt-get install -y --no-install-recommends minisign
          printf '%s\n' "$MINISIGN_KEY" > minisign.key
          minisign -S -s minisign.key -m SHA256SUMS -t "wireguard-gui ${REF#v}"
          rm -f minisign.key
          echo "Verifying signature with the committed public key…"
          minisign -Vm SHA256SUMS -p minisign.pub
          test -s SHA256SUMS.minisig

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.deb
            *.AppImage
            SHA256SUMS
            SHA256SUMS.minisig
            minisign.pub
