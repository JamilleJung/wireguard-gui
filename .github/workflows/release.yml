name: Release

# Tag a version to cut a release:
#   git tag vX.Y.Z && git push origin vX.Y.Z
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build artifacts & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Version from tag
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libfontconfig-dev libxkbcommon-dev \
            libgl1-mesa-dev libegl1-mesa-dev libdbus-1-dev \
            file desktop-file-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build release binary
        run: cargo build --release

      # ---------------- binary tarball ----------------
      - name: Build binary tarball
        run: |
          V="${{ steps.ver.outputs.v }}"
          D="wireguard-gui-${V}-x86_64-linux"
          mkdir -p "$D"
          cp target/release/wireguard-gui "$D/"
          cp packaging/wg-helper "$D/"
          cp packaging/wireguard-gui.desktop "$D/"
          cp packaging/wireguard-gui.svg "$D/"
          cp packaging/49-wireguard-gui.rules "$D/"
          cp install.sh README.md LICENSE "$D/"
          tar -czf "${D}.tar.gz" "$D"

      # ---------------- .deb ----------------
      - name: Build .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build --no-strip || cargo deb
          cp target/debian/*.deb . || true

      # ---------------- AppImage ----------------
      - name: Build AppImage
        continue-on-error: true   # never block the .deb/tarball release
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          V="${{ steps.ver.outputs.v }}"
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/lib/wireguard-gui" \
                   "$APPDIR/usr/share/applications" \
                   "$APPDIR/usr/share/icons/hicolor/scalable/apps"
          cp target/release/wireguard-gui "$APPDIR/usr/bin/"
          cp packaging/wg-helper "$APPDIR/usr/lib/wireguard-gui/"
          cp packaging/wireguard-gui.desktop "$APPDIR/usr/share/applications/"
          cp packaging/wireguard-gui.svg "$APPDIR/usr/share/icons/hicolor/scalable/apps/"
          # Pinned linuxdeploy release + verified checksum (supply-chain hardening)
          curl -fsSL -o linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-x86_64.AppImage
          echo "c20cd71e3a4e3b80c3483cef793cda3f4e990aca14014d23c544ca3ce1270b4d  linuxdeploy" | sha256sum -c -
          chmod +x linuxdeploy
          ./linuxdeploy --appdir "$APPDIR" \
            -e "$APPDIR/usr/bin/wireguard-gui" \
            -d packaging/wireguard-gui.desktop \
            -i packaging/wireguard-gui.svg \
            --output appimage
          mv ./*.AppImage "wireguard-gui-${V}-x86_64.AppImage" 2>/dev/null || true

      # ---------------- checksums ----------------
      - name: Generate checksums
        run: |
          sha256sum *.tar.gz *.deb *.AppImage 2>/dev/null | tee SHA256SUMS

      # ---------------- sign the checksums (minisign) ----------------
      - name: Sign SHA256SUMS with minisign
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          if [ -z "$MINISIGN_KEY" ]; then
            echo "::warning::MINISIGN_KEY secret not set — skipping signature"
            exit 0
          fi
          sudo apt-get install -y --no-install-recommends minisign
          printf '%s\n' "$MINISIGN_KEY" > minisign.key
          minisign -S -s minisign.key -m SHA256SUMS \
            -t "wireguard-gui ${{ steps.ver.outputs.v }}"
          rm -f minisign.key
          echo "Verifying signature with the committed public key…"
          minisign -Vm SHA256SUMS -p minisign.pub

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.deb
            *.AppImage
            SHA256SUMS
            SHA256SUMS.minisig
            minisign.pub
