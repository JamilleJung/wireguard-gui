name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI never needs to write; keep the token read-only regardless of repo default.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build, fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libfontconfig-dev libxkbcommon-dev \
            libgl1-mesa-dev libegl1-mesa-dev libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: Build (release)
        run: cargo build --release

      - name: Smoke test (binary starts & parses args)
        run: |
          ./target/release/wireguard-gui --version | grep -q '^wireguard-gui '
          ./target/release/wireguard-gui --help >/dev/null

      # Launch the real GUI headless so a crash during window/tray/a11y init is
      # caught here instead of by users. (Regression guard: the zbus "no reactor
      # running, must be a Tokio runtime" panic shipped undetected because the
      # checks above never opened a window.)
      - name: GUI launch smoke (headless)
        run: |
          # libxkbcommon-x11-0 is needed for the X11 (Xvfb) path; mesa DRI gives
          # a software GL context. The a11y/zbus thread (the regression target)
          # runs once X11+xkb are up, even if the GL render later struggles.
          sudo apt-get install -y --no-install-recommends \
            xvfb dbus libxkbcommon-x11-0 libgl1-mesa-dri libegl-mesa0
          set +e
          xvfb-run -a dbus-run-session -- env LIBGL_ALWAYS_SOFTWARE=1 \
            timeout 8 ./target/release/wireguard-gui >/tmp/gui-launch.log 2>&1
          rc=$?
          set -e
          # Hard-fail on the regression this guard exists for: the zbus/Tokio
          # runtime panic from ksni pulling zbus/tokio vs Slint's async-io a11y.
          if grep -qiE "no reactor running|Tokio 1\.x runtime" /tmp/gui-launch.log; then
            echo "::error::zbus/Tokio-runtime panic on launch (ksni async-io fix regressed)"
            cat /tmp/gui-launch.log; exit 1
          fi
          if [ "$rc" -eq 124 ]; then
            echo "GUI launched and stayed alive 8s under Xvfb — OK"
          elif grep -qiE "GLX|EGL|libGL|GL context|glutin|NotSupported|xkbcommon|could not" /tmp/gui-launch.log; then
            echo "::warning::GUI exited early on a headless GL/X11 limitation (rc=$rc); zbus path clean"
            cat /tmp/gui-launch.log
          else
            echo "::error::wireguard-gui crashed on launch (rc=$rc)"
            cat /tmp/gui-launch.log; exit 1
          fi

      - name: Shell lint the helper & installer
        run: |
          sudo apt-get install -y shellcheck
          bash -n install.sh
          bash -n tests/helper-validation.sh
          bash -n tests/installer-sanity.sh
          shellcheck -S warning install.sh tests/helper-validation.sh tests/installer-sanity.sh
          bash tests/helper-validation.sh target/release/wg-helper
          bash tests/installer-sanity.sh

  audit:
    name: cargo audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies against the RUSTSEC advisory DB
        # Fail on real vulnerabilities and on any NEW advisory. The IDs below are
        # pre-existing informational warnings (unmaintained / unsound) in
        # transitive build/UI dependencies (Slint's tree) with no upstream fix
        # yet — accepted knowingly; drop an entry once its upstream updates.
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2021-0139 \
            --ignore RUSTSEC-2024-0375 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2021-0145
